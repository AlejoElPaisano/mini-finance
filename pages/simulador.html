<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Finance - Simulador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../base/styles/main.css">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="./simulador.html" aria-current="page">Simulador</a></li>
        <li><a href="./resumen.html">Resumen</a></li>
        <li><a href="./market-rates.html">Cotizaciones</a></li>
      </ul>
      <button id="dark-mode-toggle" aria-label="Cambiar modo oscuro">🌙</button>
    </nav>
  </header>

  <main aria-describedby="simulator-title">
    <h1 id="simulator-title">Simulador de Movimientos</h1>

    <div id="alerts-container" aria-live="polite"></div>

    <section class="card">
      <h2 id="section-movement">Registrar Movimiento</h2>

      <form id="movement-form" class="card-form" aria-labelledby="section-movement">

        <div class="form-group">
          <label for="type">Tipo</label>
          <select id="type" name="type" required>
            <option value="">Seleccionar tipo</option>
            <option value="income">Ingreso</option>
            <option value="expense">Gasto</option>
          </select>
        </div>

        <div class="form-group">
          <label for="category">Categoría</label>
          <select id="category" name="category" required></select>
        </div>

        <div class="form-group">
          <label for="description">Descripción</label>
          <input
            type="text"
            id="description"
            name="description"
            required
            aria-describedby="description-hint"
            placeholder="Ej. Sueldo mensual"
          >
          <strong id="description-hint">Ingresá una descripción breve del movimiento.</strong>
        </div>
        
        <!--
        <div class="form-group">
          <label for="amount">Monto</label>
          <input
            type="number"
            id="amount"
            name="amount"
            min="1"
            required
            aria-describedby="amount-hint"
            placeholder="0"
          >
          <strong id="amount-hint">Ingresá el monto en pesos argentinos.</strong>
        </div>
        -->

        <div class="form-group">
          <label for="date">Fecha</label>
          <input
            type="date"
            id="date"
            name="date"
            required
          >
        </div>

        <div class="slider-grid">

          <label class="range-field" for="savings-goal">
            <span>Meta de Ahorro</span>
            <output id="savings-goal-output" for="savings-goal">$1000</output>
          </label>
          <input
            id="savings-goal"
            name="savings-goal"
            type="range"
            min="0"
            max="50000"
            step="100"
            value="1000"
            list="savings-scale"
          />


          <datalist id="savings-scale">
            <option value="0"     label="$0"></option>
            <option value="5000"  label="$5k"></option>
            <option value="10000" label="$10k"></option>
            <option value="15000" label="$15k"></option>
            <option value="20000" label="$20k"></option>
            <option value="25000" label="$25k"></option>
            <option value="30000" label="$30k"></option>
            <option value="35000" label="$35k"></option>
            <option value="40000" label="$40k"></option>
            <option value="45000" label="$45k"></option>
            <option value="50000" label="$50k"></option>
          </datalist>


          <div class="slider-scale">
            <span>$0</span>
            <span>$10k</span>
            <span>$20k</span>
            <span>$30k</span>
            <span>$40k</span>
            <span>$50k</span>
          </div>


        </div>

        <button type="submit" class="btn btn--primary" id="submit-btn">Agregar Movimiento</button>

      </form>


      <article class="card-total" >
        <p class="card-total-label" > Monto Total Disponible </p>
        <p class="card-total-amount" > $125000 </p>

        <aside  class="card-total-footer">
          <label for="adjusted-amount" class="card-total-footer__label">
            MONTO CONSIDERANDO AHORRO
          </label>
          <output id="adjusted-amount" class="card-total-footer__value">
            $0
          </output>
        </aside >


      </article>

    </section>

    <section>
      <h2>Movimientos recientes</h2>

      <section class="filters">
      
      </section>
      
      <div id="movements-list">
        <p class="empty-state">No hay movimientos registrados.</p>
      </div>
    </section>
  </main>
  <script src="../base/scripts/main.js"></script>
</body>
</html>
