<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Finance - Resumen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../base/styles/main.css">
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="./simulador.html">Simulador</a></li>
        <li><a href="./resumen.html" aria-current="page">Resumen</a></li>
        <li><a href="./market-rates.html">Cotizaciones</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Resumen Financiero</h1>

    <div id="alerts-container" aria-live="polite"></div>

    <section class="dashboard">
      <article class="card card--income">
        <h2 class="card__title">Total Ingresos</h2>
        <p class="card__value" id="total-income">$0</p>
      </article>
      <article class="card card--expense">
        <h2 class="card__title">Total Gastos</h2>
        <p class="card__value" id="total-expense">$0</p>
      </article>
      <article class="card">
        <h2 class="card__title">Saldo Disponible</h2>
        <p class="card__value" id="balance">$0</p>
      </article>
    </section>

    <section>
      <h2>Historial de Movimientos</h2>
      <div class="filters">
        <div class="form-group">
          <label for="filter-type">Filtrar por tipo</label>
          <select id="filter-type">
            <option value="">Todos</option>
            <option value="income">Ingreso</option>
            <option value="expense">Gasto</option>
          </select>
        </div>
        <div class="form-group">
          <label for="filter-category">Filtrar por categoria</label>
          <select id="filter-category">
            <option value="">Todas</option>
          </select>
        </div>
      </div>
      <div id="movements-list">
        <p class="empty-state">No hay movimientos registrados.</p>
      </div>
    </section>
  </main>

</body>
</html>
