  <main id="main-content">
    <h1>Resumen Financiero</h1>

    <div id="alerts-container" aria-live="polite"></div>

    <section class="balance-road" aria-label="Balance contable" >


      <article class="balance-card balance-card--income" >

        <h2 class="balance-card-title" >Ingresos</h2>

        <p class="balance-card-value" id="total-income" >$0</p>

      </article>

      <article class="balance-card balance-card-expense" >

        <h2 class="balance-card-title">Gastos</h2>
        <p class="balance-card-value" id="total-expense">$0</p>

      </article>

      <article class="balance-card balance-card-savings" >

        <h2 class="balance-card-title" >Reservas</h2>

        <p class="balance-card-value" id="total-savings">$0</p>

      </article>


      <article class="balance-card balance-card-balance" >

        <h2 class="balance-card-title" >Balance</h2>

        <p class="balance-card-value" id="balance" data-sign="positive" >$0</p>

      </article>


    </section>


    <section class="ledger" aria-labelledby="ledger-title" >

      <header class="ledger-header">

        <h2 id="ledger-title" > Historial de Movimientos </h2>

        <span 
          id="movements-count" 
          class="ledger-count" 
          aria-live="polite"
        >
          0 movimientos
        </span>

      </header>


      <article class="ledger-filters" >

        <div class="form-group" >

          <label for="filter-type">Tipo</label>

          <select name="filter-type" id="filter-type">

            <option value="">Todos</option>
            
            <option value="income">Ingreso</option>
            
            <option value="expense">Gasto</option>
            
            <option value="savings">Meta de Ahorro</option>

          </select>

        </div>


        <div class="form-group" >

          <label for="filter-category">Categoría</label>

          <select name="filter-category" id="filter-category">

            <option value="">Todas</option>
            
            <option value="salary">Sueldo</option>
            <option value="sales">Ventas</option>
            <option value="food">Alimentos</option>
            <option value="transport">Transporte</option>
            <option value="services">Servicios</option>
            <option value="entertainment">Entretenimiento</option>

          </select>

        </div>


      </article>


      <article class="ledger-table" role="table" aria-label="Tabla de movimientos" >

        <aside class="ledger-head" role="row" >
          
          <span role="columnheader"> Fecha </span>
          <span role="columnheader"> Descripción </span>
          <span role="columnheader"> Tipo </span>
          <span role="columnheader"> Categoría </span>
          <span role="columnheader" class="ledger-head-right" > Monto </span>

        </aside>

        <ol id="movements-list" class="ledger-list" aria-live="polite" >

          <li class="ledger-empty" >No hay movimientos registrados.</li>

        </ol>

        <template id="ledger-row-template">

          <li class="ledger-row">

            <time class="ledger-row-date"></time>

            
            <span class="ledger-row-description"></span>
            
            <span class="ledger-row-type"></span>
            
            <span class="ledger-row-category"></span>
            
            <span class="ledger-row-amount"></span>
          
          </li>
        
        </template>

      </article>


    </section>



  </main>

  <!-- ==========================================
       PESITO — Asistente Virtual Flotante
       ========================================== -->
  <div id="pesito-container" class="pesito-container">
    <div class="pesito-chat" role="dialog" aria-modal="true" aria-label="Chat con Pesito, asistente virtual">
      <header class="pesito-header">
        <div class="pesito-header__info">
          <div class="pesito-header__avatar" aria-hidden="true">
            <!-- Pesito: Moneda-cerdito animada, identidad visual de Mini Finance -->
            <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Orejas -->
              <ellipse cx="25" cy="22" rx="11" ry="17" fill="#f59e0b" stroke="#b45309" stroke-width="3" transform="rotate(-25 25 22)"/>
              <ellipse cx="75" cy="22" rx="11" ry="17" fill="#f59e0b" stroke="#b45309" stroke-width="3" transform="rotate(25 75 22)"/>
              <!-- Interior orejas -->
              <ellipse cx="25" cy="22" rx="5" ry="9" fill="#fde68a" transform="rotate(-25 25 22)"/>
              <ellipse cx="75" cy="22" rx="5" ry="9" fill="#fde68a" transform="rotate(25 75 22)"/>

              <!-- Moneda / Cara -->
              <circle cx="50" cy="56" r="36" fill="url(#goldGradient)" stroke="#b45309" stroke-width="3"/>
              <!-- Relieve borde moneda -->
              <circle cx="50" cy="56" r="32" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5 4" opacity="0.5"/>

              <!-- Ojos -->
              <circle cx="38" cy="50" r="5.5" fill="#1e293b"/>
              <circle cx="62" cy="50" r="5.5" fill="#1e293b"/>
              <circle cx="40" cy="48" r="2" fill="white"/>
              <circle cx="64" cy="48" r="2" fill="white"/>

              <!-- Mejillas -->
              <circle cx="30" cy="60" r="4.5" fill="#fca5a5" opacity="0.5"/>
              <circle cx="70" cy="60" r="4.5" fill="#fca5a5" opacity="0.5"/>

              <!-- Sonrisa -->
              <path d="M42 64 Q50 72 58 64" stroke="#1e293b" stroke-width="3" stroke-linecap="round" fill="none"/>
              <path d="M40 63 Q42 65 44 63" stroke="#1e293b" stroke-width="2" stroke-linecap="round" fill="none"/>
              <path d="M56 63 Q58 65 60 63" stroke="#1e293b" stroke-width="2" stroke-linecap="round" fill="none"/>

              <!-- Letra P de Pesito (marca de la moneda) -->
              <text x="50" y="42" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="13" fill="#92400e" opacity="0.35">P</text>

              <!-- Reflejo metálico -->
              <ellipse cx="34" cy="28" rx="10" ry="5" fill="white" opacity="0.3" transform="rotate(-25 34 28)"/>

              <defs>
                <linearGradient id="goldGradient" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#fcd34d"/>
                  <stop offset="0.5" stop-color="#fbbf24"/>
                  <stop offset="1" stop-color="#f59e0b"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div>
            <h2 class="pesito-header__name">Pesito</h2>
            <span class="pesito-header__status">En línea</span>
          </div>
        </div>
        <button type="button" class="pesito-header__close" aria-label="Cerrar chat">
          <span aria-hidden="true">✕</span>
        </button>
      </header>

      <div class="pesito-messages" id="pesito-messages" aria-live="polite"></div>

      <div class="pesito-typing" id="pesito-typing" hidden>
        <div class="pesito-typing__dots">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="pesito-options" id="pesito-options"></div>
    </div>
  </div>

  <button type="button" id="pesito-toggle" class="pesito-toggle" aria-expanded="false" aria-label="Abrir asistente virtual Pesito">
    <span class="pesito-toggle__icon pesito-toggle__icon--open" aria-hidden="true">
      <!-- Pesito mini para el botón flotante -->
      <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="25" cy="22" rx="11" ry="17" fill="#f59e0b" stroke="#92400e" stroke-width="3" transform="rotate(-25 25 22)"/>
        <ellipse cx="75" cy="22" rx="11" ry="17" fill="#f59e0b" stroke="#92400e" stroke-width="3" transform="rotate(25 75 22)"/>
        <ellipse cx="25" cy="22" rx="5" ry="9" fill="#fde68a" transform="rotate(-25 25 22)"/>
        <ellipse cx="75" cy="22" rx="5" ry="9" fill="#fde68a" transform="rotate(25 75 22)"/>
        <circle cx="50" cy="56" r="36" fill="url(#goldGradToggle)" stroke="#92400e" stroke-width="3"/>
        <circle cx="38" cy="50" r="5.5" fill="#1e293b"/>
        <circle cx="62" cy="50" r="5.5" fill="#1e293b"/>
        <circle cx="40" cy="48" r="2" fill="white"/>
        <circle cx="64" cy="48" r="2" fill="white"/>
        <path d="M42 64 Q50 72 58 64" stroke="#1e293b" stroke-width="3" stroke-linecap="round" fill="none"/>
        <ellipse cx="34" cy="28" rx="10" ry="5" fill="white" opacity="0.3" transform="rotate(-25 34 28)"/>
        <defs>
          <linearGradient id="goldGradToggle" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
            <stop stop-color="#fcd34d"/>
            <stop offset="0.5" stop-color="#fbbf24"/>
            <stop offset="1" stop-color="#f59e0b"/>
          </linearGradient>
        </defs>
      </svg>
    </span>
    <span class="pesito-toggle__icon pesito-toggle__icon--close" aria-hidden="true">✕</span>
  </button>
